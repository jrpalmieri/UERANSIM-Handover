# IMSI number of the UE. IMSI = [MCC|MNC|MSISDN] (In total 15 digits)
supi: 'imsi-286010000000001'
# Mobile Country Code value of HPLMN
mcc: '286'
# Mobile Network Code value of HPLMN (2 or 3 digits)
mnc: '01'
# SUCI Protection Scheme : 0 for Null-scheme, 1 for Profile A and 2 for Profile B
protectionScheme: 0
# Home Network Public Key for protecting with SUCI Profile A
homeNetworkPublicKey: '5a8d38864820197c3394b92613b20b91633cbd897119273bf8e4a6f4eec0a650'
# Home Network Public Key ID for protecting with SUCI Profile A
homeNetworkPublicKeyId: 1
# Routing Indicator
routingIndicator: '0000'

# Permanent subscription key
key: '465B5CE8B199B49FAA5F0A2EE238A6BC'
# Operator code (OP or OPC) of the UE
op: 'E8ED289DEBA952E4283B54E88E6183CA'
# This value specifies the OP type and it can be either 'OP' or 'OPC'
opType: 'OP'
# Authentication Management Field (AMF) value
amf: '8000'
# IMEI number of the device. It is used if no SUPI is provided
imei: '356938035643803'
# IMEISV number of the device. It is used if no SUPI and IMEI is provided
imeiSv: '4370816125816151'

# Network mask used for the UE's TUN interface to define the subnet size
tunNetmask: '255.255.255.0'

# List of gNB IP addresses for Radio Link Simulation
gnbSearchList:
  - 127.0.0.1

# UAC Access Identities Configuration
uacAic:
  mps: false
  mcs: false

# UAC Access Control Class
uacAcc:
  normalClass: 0
  class11: false
  class12: false
  class13: false
  class14: false
  class15: false

# Initial PDU sessions to be established
sessions:
  - type: 'IPv4'
    apn: 'internet'
    slice:
      sst: 1
      sd: 1

# Configured NSSAI for this UE by HPLMN
configured-nssai:
  - sst: 1
    sd: 1

# Default Configured NSSAI for this UE
default-nssai:
  - sst: 1
    sd: 1

# Supported integrity algorithms by this UE
integrity:
  IA1: true
  IA2: true
  IA3: true

# Supported encryption algorithms by this UE
ciphering:
  EA1: true
  EA2: true
  EA3: true

# Integrity protection maximum data rate for user plane
integrityMaxRate:
  uplink: 'full'
  downlink: 'full'


# RLS loop/timer settings (ms).
# If not specified, default values will be used:
#   LOOP_COUNTER: 1000
#   RECEIVE_TIMEOUT: 200
#   TIMER_PERIOD_ACK_SEND: 1500
#   TIMER_PERIOD_ACK_CONTROL: 2250
# If these are omitted, default values will be used.
# HEARTBEAT_THRESHOLD is always computed as LOOP_COUNTER + RECEIVE_TIMEOUT.
# These MUST be coordinated with the GNB configuration to avoid timeout issues causing UE registration flapping.
rls:
  LOOP_COUNTER: 200
  RECEIVE_TIMEOUT: 100
  TIMER_PERIOD_ACK_SEND: 300
  TIMER_PERIOD_ACK_CONTROL: 500

# UE position - used in RSRP calculations and CHO distance-based conditions.
# Specified in WGS-84 geographic coordinates (converted to ECEF by UE).
position:
  latitude: 45.0000    # degrees North
  longitude: 90.0000   # degrees East
  altitude: 0.0      # meters above WGS-84 ellipsoid

# parameters for Non-Terrestrial Network (NTN) operation
ntn:
  # NTN satellite-time control for UE-side SIB19/CHO satellite propagation.
  timeWarp:
    startCondition: moving
    tickScaling: 1.0
    startEpoch: "23162.59097222"


# Measurement Source Configuration (optional)
# If not specified, the UE will use its internal RLS-simulated measurements by default
measSource:
  # Type of measurement source: NONE, UDP, UNIX_SOCKET, or FILE
  type: 'UDP'
  # For UDP measurement source: specify the local port to listen on for measurement messages
  udpPort: 7200



