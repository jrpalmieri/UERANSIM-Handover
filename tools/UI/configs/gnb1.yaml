mcc: '001'          # Mobile Country Code value
mnc: '01'           # Mobile Network Code value (2 or 3 digits)

nci: '0x000000011'  # NR Cell Identity (36-bit), low bits encode non-zero cell ID
idLength: 32        # portion of NCI that is used for the gNB ID, in bits [22...32]
                    # Note: The remaining low order bits of NCI (36-idLength) are used for the Cell ID.
tac: 1              # Tracking Area Code

linkIp: 127.0.0.2   # gNB's local IP address for Radio Link Simulation (must match UE gnbSearchList)
ngapIp: 172.22.0.202   # gNB's local IP address for N2 Interface (Usually same with local IP)
gtpIp: 172.22.0.202    # gNB's local IP address for N3 Interface (Usually same with local IP)

# List of AMF address information
amfConfigs:
  - address: 172.22.0.10
    port: 38412

# List of supported S-NSSAIs by this gNB
slices:
  - sst: 1
    #sd: 1

# Indicates whether or not SCTP stream number errors should be ignored.
ignoreStreamIds: true

# RSRP configuration:
#   dbValue: initial RSRP value (dBm) used in Fixed mode and as the starting fixed value
#   updateMode: Calculated (distance/path-loss based) or Fixed (ignore distance)
rsrp:
  dbValue: -60
  updateMode: Fixed

# RLS loop/timer settings (ms).
#  If these are omitted, default values will be used:
#   LOOP_COUNTER: 1000
#   RECEIVE_TIMEOUT: 200
#   TIMER_PERIOD_ACK_SEND: 1500
#   TIMER_PERIOD_ACK_CONTROL: 2250
# (HEARTBEAT_THRESHOLD is always computed as LOOP_COUNTER + RECEIVE_TIMEOUT).
rls:
  LOOP_COUNTER: 200
  RECEIVE_TIMEOUT: 300
  TIMER_PERIOD_ACK_SEND: 300
  TIMER_PERIOD_ACK_CONTROL: 500

# Neighbor cells for handover
neighborList:
  - nci: '0x000000022'
    idLength: 32
    tac: 1
    ipAddress: 127.0.0.3
    handoverInterface: N2
  # - nci: '0x000000030'
  #   idLength: 32
  #   tac: 1
  #   ipAddress: 127.0.0.3
  #   handoverInterface: N2

# gNB geographic position (lat/lon/alt, WGS-84)
# Used as the static terrestrial position or as fallback
# when no TLE has been received in satellite mode
position:
  latitude: 33.7490     # degrees North
  longitude: -84.3880   # degrees East
#  altitude: 550000.0    # meters above ellipsoid (LEO orbit)
  altitude: 800.0      # meters above ellipsoid (typical for terrestrial gNB)



# Satellite simulation: set to true to enable NTN satellite mode
satSim: false

# Satellite link budget parameters (used when satSim is true)
satLink:
  frequencyHz: 10.7e9   # Ku-band carrier frequency (Hz)
  txPowerDbW: 43.0       # Radiated (transmit) power (dBW)
  txGainDbi: 35.0        # Transmit antenna gain (dBi)
  rxGainDbi: 25.0        # Receive antenna gain (dBi)

# Handover measurement/CHO configuration.
# events: classic (non-CHO) events always sent to UEs.
# choEvents: CHO condition groups (AND within group).
# CHO priority is derived from target candidate ranking (best=1).
handover:
  choEnabled: false
  events:
    - eventType: A3
      a3OffsetDb: 3
      hysteresisDb: 1
      tttMs: 200
  choEvents:
    - events:
        - eventType: D1
          distanceThreshold: 1200
          distanceType: nadir
          hysteresisM: 100
          tttMs: 1000
          # Required when distanceType is fixed.
          referencePosition:
            latitude: 37.7749
            longitude: -122.4194
            altitude: 100
        - eventType: A3
          a3OffsetDb: 3
          hysteresisDb: 1
          tttMs: 1000
  xn:
    enabled: false
    bindAddress: 127.0.0.1
    bindPort: 9487
    requestTimeoutMs: 1000
    contextTtlMs: 5000
    fallbackToN2: true
        
# NTN configuration
ntn:
  # controls how SIB19 is configured/sent
  sib19:
    # sib19on must be true to enable SIB19 transmissions
    sib19on: false
    # send period (in ms)
    sib19timing: 1000
    # these params are not used in the simulation, set to default values for completeness
    kOffset: 0
    taCommon: 0
    taCommonDrift: 0
    # taCommonDriftVariation: 0
    # ulSyncValidityDuration: 60
    # cellSpecificKoffset: 0
    # polarization: 0          # 0: RHCP, 1: LHCP, 2: LINEAR
    # taDrift: 0