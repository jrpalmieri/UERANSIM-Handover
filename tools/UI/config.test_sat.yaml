demo_name: 'Sat Simulation using eventT1'

amf:
  host: 172.22.0.10
  port: 38412
  protocol: sctp
  active_probe: false
  connect_timeout_sec: 1.0
  source_log_file: /home/joe/repos/GT/cs8903/docker_open5gs/log/amf.log
  amf_log_file: amf_%i.log

ui:
  poll_interval_sec: 1.0
  max_log_lines: 400
  command_timeout_sec: 3.0

user_plane:
  upf_ip: 172.22.0.8
  upf_port: 5000
  capture_enabled: true
  capture_use_sudo: true
  capture_sudo_non_interactive: true
  move_tun_to_netns: true
  netns_name: ue1
  netns_prefix_len: 16
  ensure_host_route_to_ue: true
  host_route_gateway: 172.22.0.8
  host_route_subnet: 172.22.0.0/24
  max_log_lines: 400

core_db:
  warn_missing_subscribers: true
  dbctl_script: ./tools/open5gs-dbctl.py
  db_uri: mongodb://localhost/open5gs
  check_timeout_sec: 10.0
  python: python3

ue:
  node: UE1
  count: 1
  ue_command: ./build/nr-ue
  config: ./tools/UI/configs/ue1.yaml
  ue_log_file: ue.log_%i
  create_db_profiles: false
  auto_setcap: true
  run_with_sudo: true
  sudo_non_interactive: false
  cli_with_sudo: true
  cli_sudo_non_interactive: true
  args: []

gnb:
  gnb_command: ./build/nr-gnb
  gnbs:
  - node: GNB1
    config: ./tools/UI/configs/gnb1_sat_T1.yaml
    gnb_log_file: gnb1_%i.log
    args: []
  - node: GNB2
    config: ./tools/UI/configs/gnb2_sat.yaml
    gnb_log_file: gnb2_%i.log
    args: []

command_cli: ./build/nr-cli

user_plane_test:
  enabled: true
  ue_source: all
  start_trigger: tun-up
  start_delay_sec: 0.0
  cycle_time_sec: 1.0
  end_time_sec: 60.0
  end_count: 0
  message_text: "Hello, World!"
  message_size_bytes: 100
  pad_byte_value: 0x20

pcap:
  enabled: true
  interface: amf
  output_file: trace_cond_%i.pcap
  use_sudo: true
  sudo_non_interactive: true

run:
  stop_after_sec: 60
  iterations: 1
  reset_core: true
  reset_command: ./tools/reset_core.sh
  reset_command_args: [--save-logs=%i]
  run_log: demorun.log
  logging:
    log_dir: ./tools/UI/logs
    run_log_dir_name: demo-sat-%u-%t

sat_tles:
  - gnb: GNB1
    line1: '1 99991U 26001A   26001.00000000  .00000000  00000-0  00000-0 0  0008'
    line2: '2 99991  45.0000 280.4606 0001000   0.0000  90.0000 15.00000000    11'
  - gnb: GNB2
    line1: '1 99992U 26001A   26001.00000000  .00000000  00000-0  00000-0 0  0009'
    line2: '2 99992  45.0000 280.4606 0001000   0.0000  70.0000 15.00000000    10'
  - gnb: GNB3
    line1: '1 99993U 26001A   26001.00000000  .00000000  00000-0  00000-0 0  0000'
    line2: '2 99993  45.0000 280.4606 0001000   0.0000  50.0000 15.00000000    19'
  - gnb: GNB4 
    line1: '1 99994U 26001A   26001.00000000  .00000000  00000-0  00000-0 0  0001'
    line2: '2 99994  45.0000 280.4606 0001000   0.0000  30.0000 15.00000000    18'
  - gnb: GNB5
    line1: '1 99995U 26001A   26001.00000000  .00000000  00000-0  00000-0 0  0002'
    line2: '2 99995  45.0000 280.4606 0001000   0.0000  10.0000 15.00000000    17'

script:
# send sat TLEs
- time: 1
  commands:
  - node: GNB1
    command: sat-tle
    args: [{"satellites":[
      {
        "pci": 34,
        "line1": '1 99993U 26001A   26001.00000000  .00000000  00000-0  00000-0 0  0000',
        "line2": '2 99993  45.0000 280.4606 0001000   0.0000  50.0000 15.00000000    19'
      }
    ]}]
  - node: GNB2
    command: sat-tle
    args: [{"satellites":[
      {
        "pci": 17,
        "line1": '1 99991U 26001A   26001.00000000  .00000000  00000-0  00000-0 0  0008',
        "line2": '2 99991  45.0000 280.4606 0001000   0.0000  90.0000 15.00000000    11'
      }
    ]}]

# coordinate start of sat times
- time: 2
  effective_time: 5
  commands:
  - node: GNB1
    command: sat-time
    args: ['run']
  - node: GNB2
    command: sat-time
    args: ['run']
  - node: UE1
    command: sat-time
    args: ['run']

- time: 20
  commands:
  - node: GNB2
    command: set-rsrp
    args: [-90]
