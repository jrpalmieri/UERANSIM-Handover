executables:
  nr_cli: ./build/nr-cli
  nr_ue: ./build/nr-ue
  nr_gnb: ./build/nr-gnb

amf:
  host: 172.22.0.10
  port: 38412
  protocol: sctp
  active_probe: false
  connect_timeout_sec: 1.0
  log_file: /home/joe/repos/GT/cs8903/docker_open5gs/log/amf.log

ui:
  poll_interval_sec: 1.0
  max_log_lines: 400
  command_timeout_sec: 3.0
  process_log_dir: ./tools/dashboard/logs

user_plane:
  upf_ip: 172.22.0.8
  upf_port: 5000
  capture_enabled: true
  capture_use_sudo: true
  capture_sudo_non_interactive: true
  move_tun_to_netns: true
  netns_name: ue1
  netns_prefix_len: 16
  ensure_host_route_to_ue: true
  host_route_gateway: 172.22.0.8
  host_route_subnet: 172.22.0.0/24
  max_log_lines: 400

core_db:
  warn_missing_subscribers: true
  dbctl_script: ./tools/open5gs-dbctl.py
  db_uri: mongodb://localhost/open5gs
  check_timeout_sec: 10.0
  python: python3

ue:
  node: UE1
  count: 1
  config: ./tools/dashboard/configs/ue1.yaml
  auto_setcap: true
  run_with_sudo: true
  sudo_non_interactive: false
  cli_with_sudo: true
  cli_sudo_non_interactive: true
  args: []

gnbs:
- node: GNB1
  config: ./tools/dashboard/configs/gnb1_fixed.yaml
  args: []
- node: GNB2
  config: ./tools/dashboard/configs/gnb2_fixed.yaml
  args: []

script:
- time: 10
  commands:
  - node: GNB2
    command: set-rsrp
    args: [-90]
- time: 12
  commands:
  - node: GNB2
    command: set-rsrp
    args: [-87]
- time: 14
  commands:
  - node: GNB2
    command: set-rsrp
    args: [-84]
- time: 16
  commands:
  - node: GNB2
    command: set-rsrp
    args: [-81]
- time: 18
  commands:
  - node: GNB2
    command: set-rsrp
    args: [-78]
- time: 20
  commands:
  - node: GNB2
    command: set-rsrp
    args: [-75]
