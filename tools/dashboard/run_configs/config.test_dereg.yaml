demo_name: 'Handover by De-Register then Register'

command_cli: ./build/nr-cli

amf:
  host: 172.22.0.10
  port: 38412
  protocol: sctp
  active_probe: false
  connect_timeout_sec: 1.0
  source_log_file: /home/joe/repos/GT/cs8903/docker_open5gs/log/amf.log
  amf_log_file: amf_%i.log

ui:
  poll_interval_sec: 1.0
  max_log_lines: 400
  command_timeout_sec: 3.0

user_plane:
  upf_ip: 172.22.0.8
  upf_port: 5000
  capture_enabled: true
  capture_use_sudo: true
  capture_sudo_non_interactive: true
  move_tun_to_netns: true
  netns_name: ue1
  netns_prefix_len: 16
  ensure_host_route_to_ue: true
  host_route_gateway: 172.22.0.8
  host_route_subnet: 172.22.0.0/24
  max_log_lines: 400

core_db:
  warn_missing_subscribers: true
  dbctl_script: ./tools/open5gs-dbctl.py
  db_uri: mongodb://localhost/open5gs
  check_timeout_sec: 10.0
  python: python3

ue:
  node: UE1
  count: 1
  ue_command: ./build/nr-ue
  args: []
  config: ./tools/dashboard/configs/ue1.yaml
  ue_log_file: ue.log_%i
  create_db_profiles: false
  start_delay_sec: 5.0
  # latitude: 40.00
  # longitude: -72.00
  # altitude: 0.0
  auto_setcap: true
  run_with_sudo: true
  sudo_non_interactive: false
  cli_with_sudo: true
  cli_sudo_non_interactive: true
  args: []

gnb:
  gnb_command: ./build/nr-gnb
  gnbs:
  - node: GNB1
    config: ./tools/dashboard/configs/gnb1_fixed.yaml
    gnb_log_file: gnb1_%i.log
    args: []
  - node: GNB2
    config: ./tools/dashboard/configs/gnb2_fixed.yaml
    gnb_log_file: gnb2_%i.log
    args: []

user_plane_test:
  enabled: true
  # ue name or "all"
  ue_source: all
  # "tun-up", "immediate" 
  start_trigger: tun-up
  # start delay in seconds after the trigger condition is met
  start_delay_sec: 0.0
  # repeat period in seconds for sending test messages (if 0, only send once)
  cycle_time_sec: 1.0
  # end time in seconds after the start trigger (for cyclic sending))
  end_time_sec: 60.0
  # end count for number of messages to send (for cyclic sending, if 0, ignore count and only use end_time_sec)
  end_count: 0
  message_text: "Hello, World!"
  message_size_bytes: 100
  pad_byte_value: 0x20

pcap:
  core:
    enabled: true
    # interface to capture on (e.g. "amf" for interface connected to AMF, "ue1-tun", "ue1-ran")
    interface: amf
    # output pcap file (stored in log directory)
    output_file: core_trace_%i.pcap
    # whether to use sudo for tcpdump (often required to capture on interfaces)
    use_sudo: true
    # whether to use non-interactive sudo (i.e. assume passwordless sudo) for tcpdump
    sudo_non_interactive: true
  ran:
    enabled: true
    # interface to capture on (e.g. "amf" for interface connected to AMF, "ue1-tun", "ue1-ran")
    interface: lo
    # output pcap file (stored in log directory)
    output_file: ran_trace_%i.pcap
    # whether to use sudo for tcpdump (often required to capture on interfaces)
    use_sudo: true
    # whether to use non-interactive sudo (i.e. assume passwordless sudo) for tcpdump
    sudo_non_interactive: true

run:
  stop_after_sec: 60
  iterations: 5
  reset_core: true
  reset_command: ./tools/reset_core.sh
  reset_command_args: [--save-logs=%i]
  run_log: demorun.log
  logging:
    log_dir: ./tools/dashboard/logs
    run_log_dir_name: demo-dereg-%u-%t


script:
- time: 25
  commands:
  - node: GNB2
    command: set-rsrp
    args: [-70]
- time: 30
  commands:
  - node: GNB1
    command: set-rsrp
    args: [-150]
